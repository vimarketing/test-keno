<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0A0B"/>
      <stop offset="1" stop-color="#111114"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAF9"/>
      <stop offset="1" stop-color="#A1A1AA"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <rect width="48" height="48" rx="12" fill="url(#logo)"/>
    <rect x="12" y="12" width="24" height="24" rx="6" fill="#0A0A0B"/>
  </g>
  <text x="148" y="115" font-size="22" font-weight="600" fill="#FAFAF9" letter-spacing="-0.3">Lotteries Studio</text>

  <!-- Eyebrow pill -->
  <g transform="translate(80, 200)">
    <rect width="380" height="36" rx="18" fill="#22D3EE" fill-opacity="0.10" stroke="#22D3EE" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="22" cy="18" r="4" fill="#22D3EE"/>
    <text x="38" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#22D3EE" letter-spacing="0.8">KENO · MOBILE-FIRST PWA · v2026.04</text>
  </g>

  <!-- Headline -->
  <text x="80" y="320" font-size="76" font-weight="700" fill="url(#textGrad)" letter-spacing="-2.5">60fps on a <tspan fill="#22D3EE">Redmi 10.</tspan></text>
  <text x="80" y="395" font-size="76" font-weight="700" fill="url(#textGrad)" letter-spacing="-2.5">Not a flagship Pixel.</text>

  <!-- Subline -->
  <text x="80" y="450" font-size="22" font-weight="400" fill="#D4D4D8" letter-spacing="-0.2">Mobile benchmarks before signing — published quarterly,</text>
  <text x="80" y="481" font-size="22" font-weight="400" fill="#D4D4D8" letter-spacing="-0.2">verifiable on a borrowed Redmi 10.</text>

  <!-- Bottom badges -->
  <g transform="translate(80, 540)">
    <g>
      <rect width="180" height="42" rx="8" fill="#18181B" stroke="#3F3F46" stroke-width="1"/>
      <text x="20" y="28" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#FAFAF9" font-weight="500">60fps · 1.18s · &lt;4MB</text>
    </g>
    <g transform="translate(200, 0)">
      <rect width="220" height="42" rx="8" fill="#18181B" stroke="#3F3F46" stroke-width="1"/>
      <text x="20" y="28" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#FAFAF9" font-weight="500">GLI-19 · MGA · WLA RG L1</text>
    </g>
    <g transform="translate(440, 0)">
      <rect width="180" height="42" rx="8" fill="#18181B" stroke="#3F3F46" stroke-width="1"/>
      <text x="20" y="28" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#FAFAF9" font-weight="500">SR · HR · RO · EN</text>
    </g>
  </g>

  <!-- Phone mockup illustration on right -->
  <g transform="translate(880, 130)">
    <rect width="220" height="380" rx="36" fill="#000" stroke="#1A1A1B" stroke-width="8"/>
    <rect x="65" y="14" width="90" height="14" rx="7" fill="#000"/>
    <rect x="20" y="50" width="180" height="320" rx="12" fill="url(#bg)"/>

    <!-- Status -->
    <text x="34" y="72" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#D4D4D8">09:42</text>
    <text x="158" y="72" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#D4D4D8">5G · 86%</text>

    <!-- Title -->
    <circle cx="38" cy="92" r="3" fill="#22C55E"/>
    <text x="48" y="96" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#22D3EE">Keno · cycle 0142</text>

    <!-- FPS badge -->
    <rect x="148" y="84" width="50" height="18" rx="4" fill="#22C55E" fill-opacity="0.12" stroke="#22C55E" stroke-opacity="0.25"/>
    <text x="156" y="96" font-family="JetBrains Mono, ui-monospace, monospace" font-size="8" fill="#22C55E">60fps · 58</text>

    <!-- 4×4 grid sample (8 cells × 4 rows) -->
    <g transform="translate(28, 120)">
      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#D4D4D8" text-anchor="middle">
        <!-- Row 1 -->
        <rect x="0" y="0" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="10" y="14">1</text>
        <rect x="22" y="0" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="32" y="14">2</text>
        <rect x="44" y="0" width="20" height="20" rx="4" fill="#22D3EE" stroke="#22D3EE"/><text x="54" y="14" fill="#04181B" font-weight="600">3</text>
        <rect x="66" y="0" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="76" y="14">4</text>
        <rect x="88" y="0" width="20" height="20" rx="4" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE"/><text x="98" y="14" fill="#22D3EE" font-weight="600">5</text>
        <rect x="110" y="0" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="120" y="14">6</text>
        <rect x="132" y="0" width="20" height="20" rx="4" fill="#22D3EE" stroke="#22D3EE"/><text x="142" y="14" fill="#04181B" font-weight="600">7</text>

        <!-- Row 2 -->
        <rect x="0" y="22" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="10" y="36">9</text>
        <rect x="22" y="22" width="20" height="20" rx="4" fill="#22D3EE" stroke="#22D3EE"/><text x="32" y="36" fill="#04181B" font-weight="600">10</text>
        <rect x="44" y="22" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="54" y="36">11</text>
        <rect x="66" y="22" width="20" height="20" rx="4" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE"/><text x="76" y="36" fill="#22D3EE" font-weight="600">12</text>
        <rect x="88" y="22" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="98" y="36">13</text>
        <rect x="110" y="22" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="120" y="36">14</text>
        <rect x="132" y="22" width="20" height="20" rx="4" fill="#22D3EE" stroke="#22D3EE"/><text x="142" y="36" fill="#04181B" font-weight="600">15</text>

        <!-- Row 3 -->
        <rect x="0" y="44" width="20" height="20" rx="4" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE"/><text x="10" y="58" fill="#22D3EE" font-weight="600">17</text>
        <rect x="22" y="44" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="32" y="58">18</text>
        <rect x="44" y="44" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="54" y="58">19</text>
        <rect x="66" y="44" width="20" height="20" rx="4" fill="#22D3EE" stroke="#22D3EE"/><text x="76" y="58" fill="#04181B" font-weight="600">20</text>
        <rect x="88" y="44" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="98" y="58">21</text>
        <rect x="110" y="44" width="20" height="20" rx="4" fill="#111114" stroke="#27272A"/><text x="120" y="58">22</text>
        <rect x="132" y="44" width="20" height="20" rx="4" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE"/><text x="142" y="58" fill="#22D3EE" font-weight="600">24</text>
      </g>
    </g>

    <!-- RG strip -->
    <rect x="28" y="318" width="156" height="22" rx="4" fill="#22D3EE" fill-opacity="0.06" stroke="#22D3EE" stroke-opacity="0.18"/>
    <text x="38" y="332" font-family="JetBrains Mono, monospace" font-size="9" fill="#D4D4D8">⏲ RG · between cycles</text>
  </g>
</svg>
